<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>나만의 사인 만들기 ✍️</title>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{
    margin:0; font-family:"Malgun Gothic","Segoe UI",sans-serif;
    background:linear-gradient(160deg,#f4f1ff,#ffeef6); color:#2b2340;
    min-height:100vh; padding:24px;
  }
  .wrap{max-width:860px; margin:0 auto}
  h1{font-size:26px; margin:4px 0 2px; text-align:center}
  .sub{text-align:center; color:#8a82a3; margin:0 0 22px; font-size:14px}
  .card{background:#fff; border:1px solid #e7e2f5; border-radius:18px;
        padding:20px; box-shadow:0 8px 30px rgba(90,60,180,.08); margin-bottom:18px}
  label{font-weight:700; font-size:13px; display:block; margin-bottom:8px; color:#5b5375}
  input[type=text]{
    width:100%; padding:14px 16px; font-size:18px; border:2px solid #e7e2f5;
    border-radius:12px; outline:none; transition:.15s;
  }
  input[type=text]:focus{border-color:#7c5cff}
  .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
  .chip{padding:9px 14px; border:2px solid #e7e2f5; border-radius:999px; background:#fff;
        cursor:pointer; font-size:14px; font-weight:600; transition:.12s}
  .chip.on{border-color:#7c5cff; background:#7c5cff; color:#fff}
  .stage{display:flex; flex-direction:column; align-items:center; gap:14px}
  canvas{max-width:100%; border-radius:14px; background:
    repeating-conic-gradient(#faf8ff 0% 25%, #fff 0% 50%) 50% / 22px 22px; border:1px solid #e7e2f5}
  .actions{display:flex; gap:10px; flex-wrap:wrap; justify-content:center}
  button.act{padding:12px 20px; border:none; border-radius:12px; font-size:15px; font-weight:700;
             cursor:pointer; color:#fff; background:#7c5cff}
  button.ghost{background:#fff; color:#7c5cff; border:2px solid #7c5cff}
</style>
</head>
<body>
<div class="wrap">
  <h1>✍️ 나만의 사인 만들기</h1>
  <p class="sub">이름을 쓰면 사인이 완성돼요</p>

  <div class="card">
    <label>이름 입력</label>
    <input type="text" id="name" placeholder="예) 홍길동 / Alex" value="홍길동" maxlength="20" />

    <label style="margin-top:16px">타입</label>
    <div class="row" id="typeRow">
      <div class="chip on" data-type="basic">기본형</div>
      <div class="chip" data-type="idol">아이돌st ⭐</div>
    </div>
  </div>

  <div class="card stage">
    <canvas id="cv" width="760" height="300"></canvas>
    <div class="actions">
      <button class="act ghost" id="replay">다시 쓰기 ▶</button>
      <button class="act" id="dl">PNG로 저장 ⬇</button>
    </div>
  </div>
</div>

<script>
// ── 폰트: 입력 문자로 자동 판별 ─────────────────────────────────
const TTF_BASE='https://cdn.jsdelivr.net/gh/google/fonts@main/';
const TTF = {
  'Nanum Pen Script':'ofl/nanumpenscript/NanumPenScript-Regular.ttf',
  'Alex Brush':'ofl/alexbrush/AlexBrush-Regular.ttf',
  'Sacramento':'ofl/sacramento/Sacramento-Regular.ttf',
  'Dancing Script':'ofl/dancingscript/DancingScript%5Bwght%5D.ttf',
  'Long Cang':'ofl/longcang/LongCang-Regular.ttf',
  'Yuji Syuku':'ofl/yujisyuku/YujiSyuku-Regular.ttf',
};
function detectFont(name){
  if(/[가-힣ㄱ-ㆎ]/.test(name)){ return 'Nanum Pen Script'; }
  if(/[぀-ヿ]/.test(name)){ return 'Yuji Syuku'; }
  if(/[一-鿿]/.test(name)){ return 'Long Cang'; }
  return 'Dancing Script';   // 획 굵기가 일정해 골격이 깨끗함 (Alex Brush는 장식 대문자가 뭉개짐)
}
function isLatinName(name){ return !/[가-힣ㄱ-ㆎ぀-ヿ一-鿿]/.test(name); }
// 마지막 글자의 받침 유무: true/false, 한글이 아니면 null
function lastHasBatchim(name){
  const c=name.charCodeAt(name.length-1);
  if(c>=0xAC00 && c<=0xD7A3){ return (c-0xAC00)%28!==0; }
  return null;
}

const INK='#2b2340';
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height;
let animId=0, lastLayout=null;
let curType='basic';   // basic=기본형, idol=아이돌st(강한 기울기+과장+스월)
let doodleOverride=null;   // null=이름 시드로 선택, 숫자=다시 쓰기로 뽑은 랜덤 낙서

// 시드 난수: 같은 이름 → 항상 같은 사인
function hashStr(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

// 오프스크린 SVG path — 길이/좌표 측정 전용
const SVGNS='http://www.w3.org/2000/svg';
const measSvg=document.createElementNS(SVGNS,'svg');
measSvg.setAttribute('width','0'); measSvg.setAttribute('height','0');
measSvg.style.position='absolute'; measSvg.style.left='-9999px';
const measPath=document.createElementNS(SVGNS,'path');
measSvg.appendChild(measPath); document.body.appendChild(measSvg);
function pathLength(d){ measPath.setAttribute('d',d); return measPath.getTotalLength(); }
function samplePath(d,len,n){
  measPath.setAttribute('d',d);
  const pts=[];
  for(let i=0;i<=n;i++){ const p=measPath.getPointAtLength(len*i/n); pts.push({x:p.x,y:p.y}); }
  return pts;
}

// ── 스켈레톤(중심선) 추출 ───────────────────────────────────────
function extractStrokes(p2d, bb){
  const pad=4;
  const w=Math.max(3,Math.ceil(bb.width)+pad*2);
  const h=Math.max(3,Math.ceil(bb.height)+pad*2);
  const ox=bb.x-pad, oy=bb.y-pad;
  const tc=document.createElement('canvas'); tc.width=w; tc.height=h;
  const tg=tc.getContext('2d');
  tg.translate(-ox,-oy); tg.fillStyle='#000'; tg.fill(p2d);
  const img=tg.getImageData(0,0,w,h).data;
  const g=new Uint8Array(w*h);
  for(let i=0;i<w*h;i++){ g[i]=img[i*4+3]>128?1:0; }
  zhangSuenThin(g,w,h);
  const polys=traceSkeleton(g,w,h);
  const strokes=[];
  polys.forEach(poly=>{
    const sp=simplify(poly,1.4);
    if(sp.length<2){ return; }
    const pts=sp.map(p=>({x:p.x+ox, y:p.y+oy}));
    let L=0; for(let i=1;i<pts.length;i++){ L+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y); }
    if(L>=3){ strokes.push({pts, len:L}); }
  });
  strokes.sort((a,b)=>(a.pts[0].y-b.pts[0].y)||(a.pts[0].x-b.pts[0].x));   // 필순 근사: 위→아래, 왼→오른
  return strokes;
}

// Zhang-Suen 세선화 (1px 골격)
function zhangSuenThin(g,w,h){
  const I=(x,y)=>y*w+x;
  const N=(x,y)=>[g[I(x,y-1)],g[I(x+1,y-1)],g[I(x+1,y)],g[I(x+1,y+1)],g[I(x,y+1)],g[I(x-1,y+1)],g[I(x-1,y)],g[I(x-1,y-1)]];
  let changed=true; const clr=[];
  while(changed){
    changed=false;
    for(let step=0;step<2;step++){
      clr.length=0;
      for(let y=1;y<h-1;y++){ for(let x=1;x<w-1;x++){
        if(g[I(x,y)]!==1){ continue; }
        const n=N(x,y);
        let B=0; for(let k=0;k<8;k++){ B+=n[k]; }
        if(B<2||B>6){ continue; }
        let A=0; for(let k=0;k<8;k++){ if(n[k]===0&&n[(k+1)%8]===1){ A++; } }
        if(A!==1){ continue; }
        if(step===0){ if(n[0]*n[2]*n[4]!==0){ continue; } if(n[2]*n[4]*n[6]!==0){ continue; } }
        else { if(n[0]*n[2]*n[6]!==0){ continue; } if(n[0]*n[4]*n[6]!==0){ continue; } }
        clr.push(I(x,y));
      }}
      if(clr.length){ changed=true; for(const p of clr){ g[p]=0; } }
    }
  }
}

// 골격 픽셀 → 폴리라인(획) 배열
function traceSkeleton(g,w,h){
  const I=(x,y)=>y*w+x;
  const on=(x,y)=> x>=0&&y>=0&&x<w&&y<h&&g[I(x,y)]===1;
  const nb=(x,y)=>{ const r=[]; for(let dy=-1;dy<=1;dy++){ for(let dx=-1;dx<=1;dx++){ if((dx||dy)&&on(x+dx,y+dy)){ r.push([x+dx,y+dy]); } } } return r; };
  const deg=new Map(); const pts=[];
  for(let y=0;y<h;y++){ for(let x=0;x<w;x++){ if(g[I(x,y)]===1){ pts.push([x,y]); deg.set(I(x,y),nb(x,y).length); } } }
  const seen=new Set();
  const ek=(a,b)=> a<b? a+'_'+b : b+'_'+a;
  const polys=[];
  function walk(sx,sy){
    let cx=sx,cy=sy; const poly=[{x:cx,y:cy}];
    while(true){
      let nx=null;
      for(const [ax,ay] of nb(cx,cy)){ const k=ek(I(cx,cy),I(ax,ay)); if(!seen.has(k)){ nx=[ax,ay,k]; break; } }
      if(!nx){ break; }
      seen.add(nx[2]); cx=nx[0]; cy=nx[1]; poly.push({x:cx,y:cy});
      if((deg.get(I(cx,cy))||0)!==2){ break; }
    }
    return poly;
  }
  const starts=pts.filter(([x,y])=>{ const d=deg.get(I(x,y)); return d===1||d>=3; });
  for(const [x,y] of starts){
    while(true){
      let has=false; for(const [ax,ay] of nb(x,y)){ if(!seen.has(ek(I(x,y),I(ax,ay)))){ has=true; break; } }
      if(!has){ break; }
      const p=walk(x,y); if(p.length>=2){ polys.push(p); }
    }
  }
  for(const [x,y] of pts){   // 남은 고리(끝점 없는 폐곡선)
    for(const [ax,ay] of nb(x,y)){ if(!seen.has(ek(I(x,y),I(ax,ay)))){ const p=walk(x,y); if(p.length>=2){ polys.push(p); } break; } }
  }
  return polys;
}

// Douglas-Peucker 단순화
function simplify(P,eps){
  if(P.length<3){ return P; }
  const keep=new Array(P.length).fill(false); keep[0]=keep[P.length-1]=true;
  const st=[[0,P.length-1]];
  const perp=(p,a,b)=>{ const dx=b.x-a.x,dy=b.y-a.y,L=Math.hypot(dx,dy)||1; return Math.abs((p.x-a.x)*dy-(p.y-a.y)*dx)/L; };
  while(st.length){
    const [a,b]=st.pop(); let dm=0,idx=-1;
    for(let i=a+1;i<b;i++){ const d=perp(P[i],P[a],P[b]); if(d>dm){ dm=d; idx=i; } }
    if(dm>eps&&idx>0){ keep[idx]=true; st.push([a,idx],[idx,b]); }
  }
  return P.filter((_,i)=>keep[i]);
}

// ── 손 펜 유틸 ──────────────────────────────────────────────────
function polyLen(P){ let L=0; for(let i=1;i<P.length;i++){ L+=Math.hypot(P[i].x-P[i-1].x,P[i].y-P[i-1].y); } return L; }
function transformPts(P,m){ return P.map(p=>{ const q=m.transformPoint(new DOMPoint(p.x,p.y)); return {x:q.x,y:q.y}; }); }
function resamplePts(P,step){
  if(P.length<2){ return P.slice(); }
  const out=[{x:P[0].x,y:P[0].y}]; let prev=P[0], carry=0;
  for(let i=1;i<P.length;i++){
    let a=prev, b=P[i], seg=Math.hypot(b.x-a.x,b.y-a.y);
    while(carry+seg>=step){
      const t=(step-carry)/seg;
      const nx=a.x+(b.x-a.x)*t, ny=a.y+(b.y-a.y)*t;
      out.push({x:nx,y:ny});
      a={x:nx,y:ny}; seg=Math.hypot(b.x-a.x,b.y-a.y); carry=0;
    }
    carry+=seg; prev=b;
  }
  const last=P[P.length-1], ol=out[out.length-1];
  if(Math.hypot(last.x-ol.x,last.y-ol.y)>0.5){ out.push({x:last.x,y:last.y}); }
  return out;
}
function smoothPts(P,passes){
  let cur=P;
  for(let k=0;k<passes;k++){
    if(cur.length<3){ break; }
    const nx=[cur[0]];
    for(let i=1;i<cur.length-1;i++){
      nx.push({x:(cur[i-1].x+2*cur[i].x+cur[i+1].x)/4, y:(cur[i-1].y+2*cur[i].y+cur[i+1].y)/4});
    }
    nx.push(cur[cur.length-1]);
    cur=nx;
  }
  return cur;
}
// 저주파 손떨림
function jitterPts(P,amp,rnd){
  if(P.length<3||amp<=0){ return P; }
  const p1=rnd()*6.28, p2=rnd()*6.28;
  let t=0; const out=[P[0]];
  for(let i=1;i<P.length-1;i++){
    t+=Math.hypot(P[i].x-P[i-1].x,P[i].y-P[i-1].y);
    const a=P[i-1], b=P[i+1];
    let tx=b.x-a.x, ty=b.y-a.y; const tl=Math.hypot(tx,ty)||1; tx/=tl; ty/=tl;
    const off=amp*(0.7*Math.sin(t*0.09+p1)+0.3*Math.sin(t*0.23+p2));
    out.push({x:P[i].x-ty*off, y:P[i].y+tx*off});
  }
  out.push(P[P.length-1]);
  return out;
}
// 획 양끝 접선 연장 (연결부 겹침 + 삐침)
function extendEnds(P,ext){
  if(P.length<2||ext<=0){ return P; }
  const a=P[0], b=P[1], l1=Math.hypot(b.x-a.x,b.y-a.y)||1;
  const s={x:a.x-(b.x-a.x)/l1*ext, y:a.y-(b.y-a.y)/l1*ext};
  const c=P[P.length-2], e0=P[P.length-1], l2=Math.hypot(e0.x-c.x,e0.y-c.y)||1;
  const e={x:e0.x+(e0.x-c.x)/l2*ext, y:e0.y+(e0.y-c.y)/l2*ext};
  return [s,...P,e];
}
// 폴리라인 끝(end=true)/시작 지점의 단위 접선
function tangentAt(P,end){
  if(!P||P.length<2){ return null; }
  const i=end? P.length-1 : Math.min(3,P.length-1);
  const j=end? Math.max(0,P.length-4) : 0;
  const a=end? P[j] : P[i], b=end? P[i] : P[j];
  const dx=b.x-a.x, dy=b.y-a.y, l=Math.hypot(dx,dy);
  if(l<0.01){ return null; }
  return {x:dx/l, y:dy/l};
}
// 펜 이동 브리지: 나가는 접선을 타고 진입 접선으로 흘러드는 3차 곡선.
// 방향이 어긋나면 팔을 키워 실제 필기처럼 자연스러운 고리(loop)로 돈다 — 펜을 떼지 않음.
function bridgePts(a,b,ta,tb){
  const dx=b.x-a.x, dy=b.y-a.y, l=Math.hypot(dx,dy);
  if(l<2){ return []; }
  const ux=dx/l, uy=dy/l;
  const e1=ta||{x:ux,y:uy};
  const e2=tb||{x:ux,y:uy};
  const alignA=e1.x*ux+e1.y*uy;                 // 나가는 방향 vs 목표 방향
  const alignB=e2.x*ux+e2.y*uy;                 // 진입 방향 vs 목표 방향
  const cap=Math.min(l*0.6, 40);                // 팔 상한: 긴 연결이 글자를 크게 가로지르지 않게
  const armA=Math.min(l*(0.3+0.5*Math.max(0,-alignA)), cap);
  const armB=Math.min(l*(0.3+0.5*Math.max(0,-alignB)), cap);
  const c1={x:a.x+e1.x*armA, y:a.y+e1.y*armA};
  const c2={x:b.x-e2.x*armB, y:b.y-e2.y*armB};
  const out=[], n=Math.max(8, Math.round((l+armA+armB)/2.5));
  for(let i=1;i<n;i++){
    const t=i/n, mt=1-t;
    out.push({
      x:mt*mt*mt*a.x+3*mt*mt*t*c1.x+3*mt*t*t*c2.x+t*t*t*b.x,
      y:mt*mt*mt*a.y+3*mt*mt*t*c1.y+3*mt*t*t*c2.y+t*t*t*b.y
    });
  }
  return out;
}
// 경유점을 지나는 브리지: 글자 간 이동은 글자 아래로 낮게 돌아 관통을 피함
function bridgeVia(a,w,b,ta,tb){
  const flat={x:1,y:0};
  return [...bridgePts(a,w,ta,flat), {x:w.x,y:w.y}, ...bridgePts(w,b,flat,tb)];
}
// 이음새 주변 점만 국소 스무딩
function smoothSeams(P, seams, radius, passes){
  if(!seams.length){ return P; }
  const idx=new Set();
  seams.forEach(s=>{ for(let i=s-radius;i<=s+radius;i++){ if(i>0 && i<P.length-1){ idx.add(i); } } });
  let cur=P.slice();
  for(let k=0;k<passes;k++){
    const nx=cur.slice();
    idx.forEach(i=>{ nx[i]={x:(cur[i-1].x+2*cur[i].x+cur[i+1].x)/4, y:(cur[i-1].y+2*cur[i].y+cur[i+1].y)/4}; });
    cur=nx;
  }
  return cur;
}
// 골격 조각 병합: 교차점(맞닿은 끝점)에서 접선이 가장 매끄럽게 이어지는 조각끼리 하나의 선으로
function mergeStrokesSmooth(list, tol){
  const segs=list.map(s=>s.slice());
  const used=new Array(segs.length).fill(false);
  const out=[];
  function growTail(P){
    for(;;){
      const tail=P[P.length-1], tt=tangentAt(P,true);
      let bi=-1, brev=false, bscore=-0.3;   // 급반전 병합은 제외 (브리지가 처리)
      for(let i=0;i<segs.length;i++){
        if(used[i]){ continue; }
        const s=segs[i];
        [[s[0],false],[s[s.length-1],true]].forEach(([p,rev])=>{
          if(Math.hypot(p.x-tail.x, p.y-tail.y)>tol){ return; }
          const q=rev? s.slice().reverse() : s;
          const et=tangentAt(q,false);
          const score=(tt&&et)? (tt.x*et.x+tt.y*et.y) : 0;
          if(score>bscore){ bscore=score; bi=i; brev=rev; }
        });
      }
      if(bi<0){ return; }
      used[bi]=true;
      let s=segs[bi]; if(brev){ s=s.slice().reverse(); }
      P.push(...s.slice(1));
    }
  }
  for(;;){
    let si=-1, best=-1;
    for(let i=0;i<segs.length;i++){ if(!used[i]){ const L=polyLen(segs[i]); if(L>best){ best=L; si=i; } } }
    if(si<0){ break; }
    used[si]=true;
    const P=segs[si].slice();
    growTail(P);
    P.reverse(); growTail(P); P.reverse();
    out.push(P);
  }
  return out;
}
// 스퍼(잔가지) 제거: 긴 획에 붙어 있는 짧은 조각은 세선화 부산물 → 제거. 떨어져 있는 점(i의 점 등)은 유지
function pruneSpurs(list, tol, minKeep){
  const long=list.filter(s=>polyLen(s)>=minKeep);
  return list.filter(s=>{
    if(polyLen(s)>=minKeep){ return true; }
    const a=s[0], b=s[s.length-1];
    for(const t of long){
      for(let i=0;i<t.length;i+=2){
        const p=t[i];
        if(Math.hypot(p.x-a.x,p.y-a.y)<tol || Math.hypot(p.x-b.x,p.y-b.y)<tol){ return false; }
      }
    }
    return true;
  });
}
// 글자 내 획을 최근접 이웃 순서로 재정렬 (필요 시 방향 뒤집기)
function orderStrokesNN(list){
  if(list.length<2){ return list; }
  const rem=list.slice();
  rem.sort((a,b)=>(a[0].y-b[0].y)||(a[0].x-b[0].x));
  let cur=rem.shift(); const out=[cur];
  while(rem.length){
    const tail=cur[cur.length-1];
    let bi=0, bd=1e18, brev=false;
    rem.forEach((s,i)=>{
      const d0=Math.hypot(s[0].x-tail.x, s[0].y-tail.y);
      const d1=Math.hypot(s[s.length-1].x-tail.x, s[s.length-1].y-tail.y);
      if(d0<bd){ bd=d0; bi=i; brev=false; }
      if(d1<bd){ bd=d1; bi=i; brev=true; }
    });
    cur=rem.splice(bi,1)[0];
    if(brev){ cur=cur.slice().reverse(); }
    out.push(cur);
  }
  return out;
}
// 가변 굵기 리본 펜 — 펜촉 각도에 따른 굵기 변조 + 양끝 테이퍼 + 점별 폭 계수(wf). progress 0~1, 펜 끝 좌표 반환
function ribbonStroke(pts,maxHalf,progress,nib,contrast,wf){
  if(!pts||!pts.length){ return null; }
  if(pts.length===1){ ctx.beginPath(); ctx.arc(pts[0].x,pts[0].y,maxHalf*0.7,0,7); ctx.fill(); return pts[0]; }
  const cum=[0]; let total=0;
  for(let i=1;i<pts.length;i++){ total+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y); cum.push(total); }
  if(total<=0){ return pts[0]; }
  const target=Math.max(0,Math.min(1,progress))*total;
  const P=[];
  for(let i=0;i<pts.length;i++){
    if(cum[i]<=target){ P.push({x:pts[i].x,y:pts[i].y,c:cum[i]}); }
    else{ const a=pts[i-1], f=(target-cum[i-1])/((cum[i]-cum[i-1])||1);
      P.push({x:a.x+(pts[i].x-a.x)*f, y:a.y+(pts[i].y-a.y)*f, c:target}); break; }
  }
  if(P.length<2){ return P[0]||null; }
  // 점별 반폭 계산 후, 자기교차 없는 둥근 세그먼트 스트로크로 그림 (급커브에서도 잉크가 안 파임)
  const n=P.length, HW=[];
  for(let i=0;i<n;i++){
    const a=P[Math.max(0,i-1)], b=P[Math.min(n-1,i+1)];
    let tx=b.x-a.x, ty=b.y-a.y; const tl=Math.hypot(tx,ty)||1; tx/=tl; ty/=tl;
    const t=P[i].c/total;
    const taper=Math.max(0.3, Math.min(1, t/0.09, (1-t)/0.09));
    const mod=contrast+(1-contrast)*Math.abs(Math.sin(Math.atan2(ty,tx)-nib));
    HW.push(maxHalf*Math.sqrt(taper)*mod*(wf? (wf[i]!=null?wf[i]:1) : 1));
  }
  const prevStroke=ctx.strokeStyle;
  ctx.strokeStyle=ctx.fillStyle; ctx.lineCap='round'; ctx.lineJoin='round';
  for(let i=1;i<n;i++){
    ctx.lineWidth=Math.max(0.6, HW[i-1]+HW[i]);
    ctx.beginPath(); ctx.moveTo(P[i-1].x,P[i-1].y); ctx.lineTo(P[i].x,P[i].y); ctx.stroke();
  }
  ctx.strokeStyle=prevStroke;
  return {x:P[n-1].x, y:P[n-1].y};
}

// ── 아이돌st 꾸밈 낙서 5종: 토끼/하트/별/스마일/나선스월 (모두 펜 선 낙서) ──
function doodleStrokes(kind, cx0, cy0, s){
  const T=p=>({x:cx0+p.x*s, y:cy0+p.y*s});
  const ell=(ex,ey,rx,ry,rot,a0,a1,n)=>{
    const pts=[], cr=Math.cos(rot), sr=Math.sin(rot);
    for(let i=0;i<=n;i++){
      const a=a0+(a1-a0)*i/n;
      const px=Math.cos(a)*rx, py=Math.sin(a)*ry;
      pts.push(T({x:ex+px*cr-py*sr, y:ey+px*sr+py*cr}));
    }
    return pts;
  };
  const line=(x1,y1,x2,y2)=>[T({x:x1,y:y1}), T({x:(x1+x2)/2,y:(y1+y2)/2}), T({x:x2,y:y2})];
  const dot=(x,y)=>ell(x,y,0.04,0.04,0,0,6.28,8);
  const S=[];
  if(kind===0){          // 토끼 얼굴 (귀+수염)
    S.push(ell(0,0,0.5,0.44,0,0,6.28,28));
    S.push(ell(-0.22,-0.72,0.13,0.4,-0.15,0,6.28,20));
    S.push(ell(0.22,-0.72,0.13,0.4,0.15,0,6.28,20));
    S.push(dot(-0.17,-0.06)); S.push(dot(0.17,-0.06));
    S.push(line(-0.55,-0.02,-0.95,-0.1)); S.push(line(-0.55,0.14,-0.95,0.18));
    S.push(line(0.55,-0.02,0.95,-0.1));   S.push(line(0.55,0.14,0.95,0.18));
  }else if(kind===1){    // 하트
    const pts=[], n=36;
    for(let i=0;i<=n;i++){
      const t=Math.PI*2*i/n;
      pts.push(T({x:0.5*Math.pow(Math.sin(t),3),
                  y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/26}));
    }
    S.push(pts);
  }else if(kind===2){    // 별 (한 획)
    const pts=[], R=0.58;
    for(let i=0;i<=5;i++){
      const a=-Math.PI/2 + i*4*Math.PI/5;
      pts.push(T({x:Math.cos(a)*R, y:Math.sin(a)*R}));
    }
    S.push(pts);
  }else if(kind===3){    // 스마일
    S.push(ell(0,0,0.5,0.48,0,0,6.28,28));
    S.push(dot(-0.17,-0.1)); S.push(dot(0.17,-0.1));
    S.push(ell(0,0.02,0.3,0.28,0,Math.PI*0.15,Math.PI*0.85,14));
  }else if(kind===4){    // 나선 스월 + 빠지는 꼬리
    const pts=[], n=44;
    for(let i=0;i<=n;i++){
      const a=i/n*Math.PI*4.6;
      const r=0.06+0.10*a/Math.PI;
      pts.push(T({x:Math.cos(a)*r, y:Math.sin(a)*r*0.9}));
    }
    pts.push(T({x:0.62,y:0.3})); pts.push(T({x:0.85,y:0.38}));
    S.push(pts);
  }else if(kind===5){    // 고양이 (세모 귀+수염+ω 입)
    S.push(ell(0,0,0.5,0.44,0,0,6.28,28));
    S.push([T({x:-0.42,y:-0.26}), T({x:-0.5,y:-0.72}), T({x:-0.12,y:-0.42})]);
    S.push([T({x:0.42,y:-0.26}), T({x:0.5,y:-0.72}), T({x:0.12,y:-0.42})]);
    S.push(dot(-0.17,-0.08)); S.push(dot(0.17,-0.08));
    S.push(ell(-0.08,0.1,0.08,0.07,0,0,Math.PI,8));
    S.push(ell(0.08,0.1,0.08,0.07,0,0,Math.PI,8));
    S.push(line(-0.55,0.0,-0.95,-0.08)); S.push(line(-0.55,0.16,-0.95,0.2));
    S.push(line(0.55,0.0,0.95,-0.08));   S.push(line(0.55,0.16,0.95,0.2));
  }else{                 // 곰돌이 (둥근 귀+코+입)
    S.push(ell(0,0,0.5,0.46,0,0,6.28,28));
    S.push(ell(-0.34,-0.4,0.15,0.14,0,0,6.28,14));
    S.push(ell(0.34,-0.4,0.15,0.14,0,0,6.28,14));
    S.push(dot(-0.17,-0.1)); S.push(dot(0.17,-0.1));
    S.push(ell(0,0.08,0.08,0.055,0,0,6.28,10));
    S.push(ell(0,0.2,0.14,0.1,0,Math.PI*0.15,Math.PI*0.85,10));
  }
  return S;
}

// ── 폰트 로딩 (캐시) ────────────────────────────────────────────
const fontCache={};
function loadFont(family){
  if(fontCache[family]){ return Promise.resolve(fontCache[family]); }
  const rel=TTF[family];
  if(!rel || typeof opentype==='undefined'){ return Promise.reject(new Error('no-font')); }
  return fetch(TTF_BASE+rel)
    .then(r=>{ if(!r.ok){ throw new Error('http '+r.status); } return r.arrayBuffer(); })
    .then(ab=>{ const f=opentype.parse(ab); fontCache[family]=f; return f; });
}

// ── 레이아웃 + 흘림 사인 생성 ───────────────────────────────────
function buildLayout(font, name){
  const cx=W/2, cy=H/2+6;
  const latin=isLatinName(name);
  let fs=115;
  for(let i=0;i<40;i++){
    const bb=font.getPath(name,0,0,fs).getBoundingBox();
    if((bb.x2-bb.x1)<=620 && (bb.y2-bb.y1)<=200){ break; }
    fs-=4; if(fs<=28){ fs=28; break; }
  }
  const bb=font.getPath(name,0,0,fs).getBoundingBox();
  const tx=cx-(bb.x1+bb.x2)/2, ty=cy-(bb.y1+bb.y2)/2;
  const raw=font.getPaths(name, tx, ty, fs);
  const glyphs=[];
  raw.forEach(p=>{
    const d=p.toPathData(2);
    if(!d){ return; }
    measPath.setAttribute('d',d);
    const gb=measPath.getBBox();
    const p2d=new Path2D(d);
    const strokes=extractStrokes(p2d, gb);
    glyphs.push({p2d, strokes, top:gb.y, bot:gb.y+gb.height, left:gb.x, right:gb.x+gb.width, cx:gb.x+gb.width/2});
  });

  // 시드 기반 글자별 미세 변형 (같은 이름 = 같은 사인) — 라틴 필기체는 원형 유지
  const seed=hashStr(name)>>>0;
  const rnd=mulberry32(seed);
  const n=glyphs.length;
  const driftSlope=(rnd()*2-1)*0.7;
  glyphs.forEach((g,i)=>{
    if(latin){ g.mat=new DOMMatrix(); return; }
    const gcy=(g.top+g.bot)/2;
    const rotDeg=(rnd()*2-1)*5.0;
    const sc=1+(rnd()*2-1)*0.06;
    const dxc=-(g.cx-cx)*0.14;                    // 자간 압축
    const dx=(rnd()*2-1)*fs*0.03 + dxc;
    const dy=(rnd()*2-1)*fs*0.05 + driftSlope*(i-(n-1)/2)*fs*0.05;
    const m=new DOMMatrix();
    m.translateSelf(dx,dy);
    m.translateSelf(g.cx,gcy); m.rotateSelf(rotDeg); m.scaleSelf(sc); m.translateSelf(-g.cx,-gcy);
    g.mat=m;
  });
  const idol=(curType==='idol');
  const slant=(latin ? -0.06+(rnd()*2-1)*0.015 : (rnd()*2-1)*0.03-0.13) - (idol? (latin?0.09:0.05) : 0);

  // ── 한붓 흘림: 잔획 제거 → 재정렬 → 접선/고리 브리지로 전부 연결 ──
  const step=Math.max(2.2, fs*0.022);
  const amp=latin ? 0 : Math.max(0.25, fs*0.006);   // 라틴 필기체는 떨림 없음 (따라 그리기 쉽게)
  const baseHalf=Math.max(1.4, fs*0.028);
  const minLen=fs*0.04;
  const inGap=fs*(latin ? 0.4 : 0.16);
  const inGapDown=fs*0.38;   // 아래로 내려가는 이동(받침 등)은 관통 위험이 없어 넓게 허용
  const glyphGap=fs*1.1;
  const BRW=0.45;   // 연결선 폭 계수: 글자 획보다 얇게
  const chains=[]; let cur=null, curW=null, seams=[];
  const flush=()=>{ if(cur){ chains.push({pts:cur, wf:curW, seams}); cur=null; curW=null; seams=[]; } };

  if(latin){
    // ── 필기체 루틴: 원형 유지, 글자 안 골격 조각을 가까운 순서로 이어 한 줄 필기체로 ──
    const glyphLists=[];
    glyphs.forEach((g,gi)=>{
      const arr=[];
      g.strokes.forEach(st=>{
        if(st.pts.length<2){ return; }   // 짧은 조각도 병합 재료로 사용
        let pts=transformPts(st.pts, g.mat);
        if(gi===0 && idol){   // 아이돌st: 첫 글자 과장
          const c0=g.mat.transformPoint(new DOMPoint((g.left+g.right)/2,(g.top+g.bot)/2));
          pts=pts.map(p=>({x:c0.x+(p.x-c0.x)*1.25, y:c0.y+(p.y-c0.y)*1.25}));
        }
        arr.push(pts);
      });
      if(!arr.length){ return; }
      const merged=pruneSpurs(mergeStrokesSmooth(arr, 6), 5, fs*0.12).filter(s=>polyLen(s)>=minLen);
      if(merged.length){ glyphLists.push(orderStrokesNN(merged)); }
    });
    glyphLists.forEach(list=>{
      list.forEach((raw2,si)=>{
        let pts=smoothPts(resamplePts(raw2,step),2);
        const gapMax=fs*(si===0 ? 0.35 : 0.3);   // 자연스럽게 닿는 조각만 연결 (판독성 우선)
        if(cur){
          const tail=cur[cur.length-1];
          const d0=Math.hypot(pts[0].x-tail.x, pts[0].y-tail.y);
          const dn=Math.hypot(pts[pts.length-1].x-tail.x, pts[pts.length-1].y-tail.y);
          if(dn<d0){ pts=pts.slice().reverse(); }
          const d=Math.min(d0,dn);
          const fwd=(si!==0) || (pts[0].x-tail.x > -fs*0.1);
          // 나가는 방향이 목표와 크게 어긋나면(펜 급반전) 연결하지 않고 자연스럽게 펜 떼기
          const ta=tangentAt(cur,true);
          const align=(ta&&d>0.01) ? (ta.x*(pts[0].x-tail.x)+ta.y*(pts[0].y-tail.y))/d : 1;
          if(d<=gapMax && fwd && align>-0.2){
            seams.push(cur.length);
            const br=bridgePts(tail, pts[0], tangentAt(cur,true), tangentAt(pts,false));
            cur.push(...br); curW.push(...br.map(()=>BRW));
            seams.push(cur.length);
            cur.push(...pts); curW.push(...pts.map(()=>1));
          }else{ flush(); cur=pts.slice(); curW=pts.map(()=>1); }
        }else{
          if(pts[0].x>pts[pts.length-1].x){ pts=pts.slice().reverse(); }
          cur=pts.slice(); curW=pts.map(()=>1);
        }
      });
    });
    flush();
    if(chains.length){
      let li=0, bx=-1e9;   // 꼬리는 가장 오른쪽에서 끝나는 체인에 (뒤 글자 관통 방지)
      chains.forEach((c,i)=>{ const e=c.pts[c.pts.length-1]; if(e.x>bx){ bx=e.x; li=i; } });
      if(!idol){ appendTail(chains[li], fs*0.7, 0, true); }   // 아이돌st는 스월이 마무리 담당
    }
  }else{
    // ── 한글/CJK 루틴: 재정렬 + 접선/고리 브리지 연결 ──
    const glyphLists=[];
    glyphs.forEach((g,gi)=>{
      const c0x=(g.left+g.right)/2, c0y=(g.top+g.bot)/2;
      const c0=g.mat.transformPoint(new DOMPoint(c0x,c0y));
      const arr=[];
      g.strokes.forEach(st=>{
        if(st.pts.length<2 || st.len<minLen){ return; }
        let pts=transformPts(st.pts, g.mat);
        if(gi===0){ const k1=idol?1.2:1.12; pts=pts.map(p=>({x:c0.x+(p.x-c0.x)*k1, y:c0.y+(p.y-c0.y)*k1})); }   // 첫 글자 과장
        arr.push(pts);
      });
      glyphLists.push(orderStrokesNN(arr));
    });
    const bat=lastHasBatchim(name);
    if(bat && glyphLists.length){
      // 마지막 글자는 받침(가장 아래 획)에서 끝나도록 재배치 → 꼬리가 받침에서 나감
      const list=glyphLists[glyphLists.length-1];
      if(list.length>1){
        let bi=0, by=-1e9;
        list.forEach((s,i)=>{ const y=Math.max(s[0].y, s[s.length-1].y); if(y>by){ by=y; bi=i; } });
        const s=list.splice(bi,1)[0];
        if(s[0].x>s[s.length-1].x){ s.reverse(); }   // 오른쪽으로 나가며 끝나게
        list.push(s);
      }
    }
    glyphLists.forEach(list=>{
      list.forEach((raw2,si)=>{
        const pts=smoothPts(resamplePts(raw2,step),2);
        let gapMax=inGap;
        if(si===0){ gapMax=glyphGap; }
        else if(cur && pts[0].y-cur[cur.length-1].y > fs*0.05){ gapMax=inGapDown; }
        if(cur){
          const tail=cur[cur.length-1];
          const d=Math.hypot(pts[0].x-tail.x, pts[0].y-tail.y);
          const fwd=(si!==0) || (pts[0].x-tail.x > -fs*0.15);   // 글자 간은 전진 방향만
          if(d<=gapMax && fwd){
            seams.push(cur.length);
            let br;
            if(si===0 && d>fs*0.45){
              // 글자 간 긴 이동: 글자 아래 낮은 경유점으로 돌아감 (관통 방지)
              const w={x:(tail.x+pts[0].x)/2, y:Math.max(tail.y,pts[0].y)+fs*0.08};
              br=bridgeVia(tail, w, pts[0], tangentAt(cur,true), tangentAt(pts,false));
            }else{
              br=bridgePts(tail, pts[0], tangentAt(cur,true), tangentAt(pts,false));
            }
            cur.push(...br); curW.push(...br.map(()=>BRW));
            seams.push(cur.length);
            cur.push(...pts); curW.push(...pts.map(()=>1));
          }else{ flush(); cur=pts.slice(); curW=pts.map(()=>1); }
        }else{ cur=pts.slice(); curW=pts.map(()=>1); }
      });
    });
    flush();
    if(chains.length && bat && !idol){ appendTail(chains[chains.length-1], fs*0.85, 0, true); }   // 꼬리는 받침에만 (아이돌st는 스월이 담당)
  }
  // 꼬리획: 펜이 떨어지는 모든 끝에 가늘어지며 빠지는 꼬리, 마지막은 길게 (사인 마무리)
  function appendTail(ch, ext, curl, directed){
    const P=ch.pts;
    if(P.length<2 || ext<=0){ return; }
    const a=P[P.length-2], b=P[P.length-1];
    let tx2=b.x-a.x, ty2=b.y-a.y; const l=Math.hypot(tx2,ty2)||1; tx2/=l; ty2/=l;
    const out=[];
    if(directed){
      // 마지막 긴 꼬리: 출발은 획 방향, 끝은 항상 오른쪽으로 흘러 빠짐
      const e={x:b.x+ext, y:b.y-ext*0.18};
      const arm=Math.min(ext*0.35, 30);
      const c1={x:b.x+tx2*arm, y:b.y+ty2*arm};
      const c2={x:e.x-ext*0.45, y:e.y+ext*0.05};
      const n=Math.max(10, Math.round(ext/3));
      for(let i=1;i<=n;i++){
        const t=i/n, mt=1-t;
        out.push({x:mt*mt*mt*b.x+3*mt*mt*t*c1.x+3*mt*t*t*c2.x+t*t*t*e.x,
                  y:mt*mt*mt*b.y+3*mt*mt*t*c1.y+3*mt*t*t*c2.y+t*t*t*e.y});
      }
    }else{
      const c1={x:b.x+tx2*ext*0.55, y:b.y+ty2*ext*0.55};
      const e={x:b.x+tx2*ext-ty2*curl, y:b.y+ty2*ext+tx2*curl};
      const n=Math.max(6, Math.round(ext/3));
      for(let i=1;i<=n;i++){
        const t=i/n, mt=1-t;
        out.push({x:mt*mt*b.x+2*mt*t*c1.x+t*t*e.x, y:mt*mt*b.y+2*mt*t*c1.y+t*t*e.y});
      }
    }
    out.forEach((p,i)=>{ P.push(p); ch.wf.push(Math.max(0.25, 1-(i+1)/out.length*0.75)); });
  }
  if(idol && chains.length){
    // 이름 bbox (스월/낙서 추가 전 기준)
    let mnX=1e9, mxX=-1e9, mnY=1e9, mxY=-1e9;
    chains.forEach(c=>c.pts.forEach(p=>{
      if(p.x<mnX){mnX=p.x;} if(p.x>mxX){mxX=p.x;}
      if(p.y<mnY){mnY=p.y;} if(p.y>mxY){mxY=p.y;}
    }));
    // 아이돌st 스월: 이름 아래를 쓸고 오른쪽 위로 빠지는 곡선
    const NW=Math.max(1,mxX-mnX), baseY=mxY+fs*0.14;
    const sx=mnX-fs*0.15;
    const ex=Math.min(W-8, mxX+NW*0.35+fs*0.2), ey=baseY-fs*0.42;
    const d=`M${sx.toFixed(1)} ${baseY.toFixed(1)} C${(mnX+NW*0.3).toFixed(1)} ${(baseY+fs*0.12).toFixed(1)} ${(mxX-NW*0.15).toFixed(1)} ${(baseY-fs*0.02).toFixed(1)} ${ex.toFixed(1)} ${ey.toFixed(1)}`;
    const len=Math.max(1,pathLength(d));
    const spts=samplePath(d,len,64);
    chains.push({pts:spts, wf:spts.map(()=>0.85), seams:[]});
    // 이름 옆 꾸밈 낙서: 7종 중 선택(기본=이름 시드, 다시 쓰기=랜덤), 이름 우상단 (안 들어가면 좌상단)
    const kind=(doodleOverride!=null ? doodleOverride : seed%7);
    const ds=fs*[0.42,0.58,0.58,0.55,0.55,0.45,0.45][kind];   // 얼굴형은 작게, 심볼형은 크게
    const earShift=({0:0.45, 5:0.3, 6:0.25})[kind]||0;        // 귀 달린 낙서는 귀 높이만큼 내림
    let dx=mxX+fs*0.55;
    if(dx+ds>W-10){ dx=mnX-fs*0.55; }
    let dy=mnY+fs*0.02+ds*earShift;
    dy+=(dx-cx)*(-slant)*0.9;                      // 기울기 회전으로 떠오르는 만큼 보정
    dy=Math.max(dy, ds*(earShift>0 ? 1.35 : 0.75));
    doodleStrokes(kind, dx, dy, ds).forEach(pp=>{
      chains.push({pts:pp, wf:pp.map(()=>0.85), seams:[]});
    });
  }
  const nib=-0.6+(rnd()*0.2-0.1);
  const handChains=chains.map(ch=>{
    const half=baseHalf*(0.95+rnd()*0.15);
    let pts=smoothSeams(ch.pts, ch.seams, 3, 2);
    pts=extendEnds(pts, half*1.1);
    let wf=[ch.wf[0], ...ch.wf, ch.wf[ch.wf.length-1]];
    for(let p=0;p<3;p++){   // 폭 전이를 부드럽게
      const nx=wf.slice();
      for(let i=1;i<wf.length-1;i++){ nx[i]=(wf[i-1]+2*wf[i]+wf[i+1])/4; }
      wf=nx;
    }
    pts=jitterPts(pts, amp, rnd);
    return {pts, len:polyLen(pts), half, wf};
  }).filter(c=>c.pts.length>=2 && c.len>2);

  return {fs, cx, cy, slant, chains:handChains, nib, contrast:(latin?0.85:0.42), glyphs};   // 라틴: 볼펜처럼 균일한 선 (끊겨 보임 방지)
}

// 좌표를 (cx,cy) 중심으로 slant 회전
function rot(x,y,cx,cy,a){
  const dx=x-cx, dy=y-cy, c=Math.cos(a), s=Math.sin(a);
  return {x:cx+dx*c-dy*s, y:cy+dx*s+dy*c};
}

// ── 렌더 ────────────────────────────────────────────────────────
function renderSolid(L){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(L.cx,L.cy); ctx.rotate(L.slant); ctx.translate(-L.cx,-L.cy);
  ctx.fillStyle=INK;
  L.chains.forEach(c=>ribbonStroke(c.pts,c.half,1,L.nib,L.contrast,c.wf));
  ctx.restore();
}

function drawPen(x,y){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.font='36px "Segoe UI Emoji",sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='bottom';
  ctx.fillText('🖌️', x-6, y+18);
}

// ── 그리기 애니메이션 ───────────────────────────────────────────
function animate(){
  const name=(document.getElementById('name').value||'이름').trim();
  const id=++animId;
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#b8b0cc'; ctx.font='20px "Malgun Gothic",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('✍️ 준비 중…', W/2, H/2);

  loadFont(detectFont(name)).then(font=>{
    if(id!==animId){ return; }
    const L=buildLayout(font, name);
    lastLayout=L;
    if(!L.chains.length){ renderSolid(L); return; }

    const items=[]; let acc=0;
    L.chains.forEach(ch=>{ items.push({pts:ch.pts, half:ch.half, wf:ch.wf, len:ch.len, start:acc, end:acc+ch.len}); acc+=ch.len; });
    const total=Math.max(1,acc);
    const durName=Math.min(7000, Math.max(2200, 800+total*2.2));   // 조금 더 천천히 쓰기
    const durAll=durName;
    let start=null;

    function frame(now){
      if(id!==animId){ return; }
      if(start===null){ start=now; }
      const el=now-start;
      const pName=Math.min(1, el/durName);
      const eName=pName<0.5?2*pName*pName:1-Math.pow(-2*pName+2,2)/2;
      const drawn=total*eName;

      ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H);
      ctx.save();
      ctx.translate(L.cx,L.cy); ctx.rotate(L.slant); ctx.translate(-L.cx,-L.cy);
      ctx.fillStyle=INK;
      let penScreen=null;
      for(const k of items){
        if(drawn>=k.end){ ribbonStroke(k.pts,k.half,1,L.nib,L.contrast,k.wf); }
        else if(drawn>k.start){
          const tip=ribbonStroke(k.pts,k.half,(drawn-k.start)/k.len,L.nib,L.contrast,k.wf);
          if(tip){ penScreen=rot(tip.x,tip.y,L.cx,L.cy,L.slant); }
        }
      }
      ctx.restore();

      if(el<durAll){
        if(penScreen){ drawPen(penScreen.x,penScreen.y); }
        requestAnimationFrame(frame);
      }else{
        renderSolid(L);
      }
    }
    requestAnimationFrame(frame);
  }).catch(()=>{
    if(id!==animId){ return; }
    // 폴백: 폰트 로드 실패 시 기본 텍스트
    ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H);
    ctx.fillStyle=INK; ctx.font='72px cursive';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(name, W/2, H/2);
  });
}

function showStatic(){
  animId++;
  const name=(document.getElementById('name').value||'이름').trim();
  const family=detectFont(name);
  if(fontCache[family]){
    const L=buildLayout(fontCache[family], name);
    lastLayout=L;
    renderSolid(L);
    return;
  }
  animate();
}

// ── 이벤트 ──────────────────────────────────────────────────────
document.querySelectorAll('#typeRow .chip').forEach(c=>{
  c.onclick=()=>{
    curType=c.dataset.type;
    document.querySelectorAll('#typeRow .chip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');
    animate();
  };
});
document.getElementById('name').addEventListener('input', ()=>{ doodleOverride=null; showStatic(); });
document.getElementById('replay').onclick=()=>{
  doodleOverride=Math.floor(Math.random()*7);   // 다시 쓸 때마다 낙서 랜덤 교체
  animate();
};
document.getElementById('dl').onclick=()=>{
  if(lastLayout){ renderSolid(lastLayout); }
  const a=document.createElement('a');
  a.download=`sign_${document.getElementById('name').value||'my'}.png`;
  a.href=cv.toDataURL('image/png'); a.click();
};

if(document.readyState!=='loading'){ animate(); }
else { window.addEventListener('DOMContentLoaded', animate); }
</script>
