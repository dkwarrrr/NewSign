<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>나만의 사인 만들기 ✍️</title>

<!-- 언어별 무료 손글씨 폰트 (Google Fonts, 상업 이용 가능) — 타이핑 미리보기/폴백용 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&family=Nanum+Pen+Script&family=Gaegu:wght@700&family=Dancing+Script:wght@700&family=Great+Vibes&family=UnifrakturMaguntia&family=Yellowtail&family=Zhi+Mang+Xing&family=Long+Cang&family=Yuji+Mai&family=Yuji+Syuku&family=East+Sea+Dokdo&family=Alex+Brush&family=Mr+Dafoe&family=Sacramento&display=swap" rel="stylesheet">

<!-- 벡터 획 애니메이션용: 폰트를 외곽선 경로로 파싱 -->
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>

<style>
  :root{
    --bg:#f4f1ff; --card:#ffffff; --ink:#2b2340; --accent:#7c5cff; --accent2:#ff6fae;
    --line:#e7e2f5;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:"Malgun Gothic","Segoe UI",sans-serif;
    background:linear-gradient(160deg,#f4f1ff,#ffeef6); color:var(--ink);
    min-height:100vh; padding:24px;
  }
  .wrap{max-width:860px; margin:0 auto}
  h1{font-size:26px; margin:4px 0 2px; text-align:center}
  .sub{text-align:center; color:#8a82a3; margin:0 0 22px; font-size:14px}

  .card{background:var(--card); border:1px solid var(--line); border-radius:18px;
        padding:20px; box-shadow:0 8px 30px rgba(90,60,180,.08); margin-bottom:18px}

  label{font-weight:700; font-size:13px; display:block; margin-bottom:8px; color:#5b5375}
  input[type=text]{
    width:100%; padding:14px 16px; font-size:18px; border:2px solid var(--line);
    border-radius:12px; outline:none; transition:.15s;
  }
  input[type=text]:focus{border-color:var(--accent)}

  .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
  .chip{padding:9px 14px; border:2px solid var(--line); border-radius:999px; background:#fff;
        cursor:pointer; font-size:14px; font-weight:600; transition:.12s}
  .chip.on{border-color:var(--accent); background:var(--accent); color:#fff}

  .styles{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-top:6px}
  .style{border:2px solid var(--line); border-radius:14px; padding:14px 10px; text-align:center;
         cursor:pointer; transition:.12s; background:#fff}
  .style:hover{transform:translateY(-2px)}
  .style.on{border-color:var(--accent2); background:#fff0f7}
  .style .nm{font-weight:700; font-size:14px}
  .style .ds{font-size:11px; color:#9a92b0; margin-top:3px}

  .stage{display:flex; flex-direction:column; align-items:center; gap:14px}
  canvas{max-width:100%; border-radius:14px; background:
    repeating-conic-gradient(#faf8ff 0% 25%, #fff 0% 50%) 50% / 22px 22px; border:1px solid var(--line)}
  .actions{display:flex; gap:10px; flex-wrap:wrap; justify-content:center}
  button.act{padding:12px 20px; border:none; border-radius:12px; font-size:15px; font-weight:700;
             cursor:pointer; color:#fff; background:var(--accent)}
  button.ghost{background:#fff; color:var(--accent); border:2px solid var(--accent)}
  .note{font-size:12px; color:#9a92b0; text-align:center; margin-top:8px; line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <h1>✍️ 나만의 사인 만들기</h1>
  <p class="sub">이름을 쓰고, 언어와 스타일을 고르면 나만의 사인이 완성돼요!</p>

  <div class="card">
    <label>이름 입력</label>
    <input type="text" id="name" placeholder="예) 홍길동 / Alex / 王小明 / さくら" value="홍길동" maxlength="20" />

    <label style="margin-top:16px">언어</label>
    <div class="row" id="langRow">
      <div class="chip on" data-lang="ko">한글</div>
      <div class="chip" data-lang="en">English</div>
      <div class="chip" data-lang="zh">中文</div>
      <div class="chip" data-lang="ja">日本語</div>
    </div>

    <label style="margin-top:16px">스타일</label>
    <div class="styles" id="styleGrid"></div>

    <label style="margin-top:16px">꾸밈</label>
    <div class="row" id="decoRow">
      <div class="chip on" data-deco="auto">기본</div>
      <div class="chip" data-deco="none">없음</div>
      <div class="chip" data-deco="heart">하트</div>
      <div class="chip" data-deco="star">별</div>
      <div class="chip" data-deco="sparkle">반짝이</div>
      <div class="chip" data-deco="crown">왕관</div>
      <div class="chip" data-deco="ribbon">리본</div>
      <div class="chip" data-deco="note">음표</div>
      <div class="chip" data-deco="clover">클로버</div>
    </div>
  </div>

  <div class="card stage">
    <canvas id="cv" width="760" height="300"></canvas>
    <div class="actions">
      <button class="act ghost" id="replay">다시 쓰기 ▶</button>
      <button class="act" id="dl">PNG로 저장 ⬇</button>
      <button class="act ghost" id="rnd">랜덤 변형 🎲</button>
    </div>
    <p class="note">
      ※ 실제 유명인의 사인이 아니라 <b>스타일 유형</b>만 흉내 낸 결과입니다. 자유롭게 사용하세요.
    </p>
  </div>
</div>

<script>
// ── 언어별 폰트 매핑 (표시 이름) ─────────────────────────────────
const FONTS = {
  ko:{ basic:'East Sea Dokdo', cute:'Gaegu', idol:'Nanum Brush Script',
       ceo:'East Sea Dokdo', politician:'East Sea Dokdo', medieval:'Nanum Brush Script' },
  en:{ basic:'Alex Brush', cute:'Gaegu', idol:'Mr Dafoe',
       ceo:'Sacramento', politician:'Mr Dafoe', medieval:'UnifrakturMaguntia' },
  zh:{ basic:'Long Cang', cute:'Long Cang', idol:'Zhi Mang Xing',
       ceo:'Zhi Mang Xing', politician:'Zhi Mang Xing', medieval:'Long Cang' },
  ja:{ basic:'Yuji Syuku', cute:'Yuji Mai', idol:'Yuji Mai',
       ceo:'Yuji Syuku', politician:'Yuji Syuku', medieval:'Yuji Syuku' },
};

// ── 폰트 파일(TTF) 경로 (jsDelivr → google/fonts, CORS 허용) ─────
const TTF_BASE='https://cdn.jsdelivr.net/gh/google/fonts@main/';
const TTF = {
  'Nanum Pen Script':'ofl/nanumpenscript/NanumPenScript-Regular.ttf',
  'Nanum Brush Script':'ofl/nanumbrushscript/NanumBrushScript-Regular.ttf',
  'Gaegu':'ofl/gaegu/Gaegu-Bold.ttf',
  'Dancing Script':'ofl/dancingscript/DancingScript%5Bwght%5D.ttf',
  'Great Vibes':'ofl/greatvibes/GreatVibes-Regular.ttf',
  'Yellowtail':'apache/yellowtail/Yellowtail-Regular.ttf',
  'UnifrakturMaguntia':'ofl/unifrakturmaguntia/UnifrakturMaguntia-Book.ttf',
  'Zhi Mang Xing':'ofl/zhimangxing/ZhiMangXing-Regular.ttf',
  'Long Cang':'ofl/longcang/LongCang-Regular.ttf',
  'Yuji Syuku':'ofl/yujisyuku/YujiSyuku-Regular.ttf',
  'Yuji Mai':'ofl/yujimai/YujiMai-Regular.ttf',
  'East Sea Dokdo':'ofl/eastseadokdo/EastSeaDokdo-Regular.ttf',
  'Alex Brush':'ofl/alexbrush/AlexBrush-Regular.ttf',
  'Mr Dafoe':'ofl/mrdafoe/MrDafoe-Regular.ttf',
  'Sacramento':'ofl/sacramento/Sacramento-Regular.ttf',
};

// ── 스타일 정의 ─────────────────────────────────────────────────
const STYLES = [
  {key:'basic',     nm:'기본형',      ds:'부드러운 손글씨',        size:100, slant:-0.03, flourish:'line',   deco:null, color:'#2b2340'},
  {key:'cute',      nm:'귀여운형',    ds:'동글동글 + 하트',        size:96,  slant:0,     flourish:'dots',   deco:'heart', color:'#ff6fae'},
  {key:'idol',      nm:'아이돌st',    ds:'화려한 스월 + 별',       size:104, slant:-0.14, flourish:'swoosh', deco:'star',  color:'#7c5cff'},
  {key:'ceo',       nm:'CEO/리더st',  ds:'각진 필체 + 단호한 밑줄', size:98,  slant:-0.08, flourish:'double', deco:null, color:'#1e2a44'},
  {key:'politician',nm:'정치인st',    ds:'크고 자신감 있게',       size:112, slant:-0.10, flourish:'double', deco:null, color:'#122a44'},
  {key:'medieval',  nm:'중세 필기체', ds:'고딕 블랙레터',          size:92,  slant:0,     flourish:'none',   deco:null, color:'#3a2c1a'},
];

let curLang='ko', curStyle='basic', jitter=0;
let variationSeed=null;   // null=이름 기반 고정 사인, 숫자=랜덤 변형
let curDeco='auto';       // auto=스타일 기본, none=없음, 그 외=모티브 키

// 시드 기반 난수 (같은 시드 → 같은 사인)
function hashStr(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function isLatin(s){ return /^[A-Za-z .'\-]+$/.test(s); }

// ── UI ──────────────────────────────────────────────────────────
const grid=document.getElementById('styleGrid');
STYLES.forEach((s,i)=>{
  const d=document.createElement('div');
  d.className='style'+(i===0?' on':''); d.dataset.key=s.key;
  d.innerHTML=`<div class="nm">${s.nm}</div><div class="ds">${s.ds}</div>`;
  d.onclick=()=>{curStyle=s.key; variationSeed=null; document.querySelectorAll('.style').forEach(x=>x.classList.remove('on')); d.classList.add('on'); animate();};
  grid.appendChild(d);
});
document.querySelectorAll('#langRow .chip').forEach(c=>{
  c.onclick=()=>{curLang=c.dataset.lang; variationSeed=null; document.querySelectorAll('#langRow .chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); animate();};
});
document.querySelectorAll('#decoRow .chip').forEach(c=>{
  c.onclick=()=>{curDeco=c.dataset.deco; document.querySelectorAll('#decoRow .chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); animate();};
});
document.getElementById('name').addEventListener('input',()=>{ variationSeed=null; showStatic(); });
document.getElementById('rnd').onclick=()=>{ variationSeed=Math.floor(Math.random()*2147483647); animate(); };
document.getElementById('replay').onclick=animate;

// ── 캔버스 ──────────────────────────────────────────────────────
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height;
let animId=0;
let lastLayout=null, lastStyle=null;   // PNG 저장용

// 오프스크린 SVG path — 길이/좌표 측정 전용
const SVGNS='http://www.w3.org/2000/svg';
const measSvg=document.createElementNS(SVGNS,'svg');
measSvg.setAttribute('width','0'); measSvg.setAttribute('height','0');
measSvg.style.position='absolute'; measSvg.style.left='-9999px';
const measPath=document.createElementNS(SVGNS,'path');
measSvg.appendChild(measPath); document.body.appendChild(measSvg);
function pathLength(d){ measPath.setAttribute('d',d); return measPath.getTotalLength(); }
function pathPointAt(d,l){ measPath.setAttribute('d',d); return measPath.getPointAtLength(l); }

// ── 스켈레톤(중심선) 추출: 글자를 '그리기' 위한 획 경로 ──────────
function extractStrokes(p2d, bb){
  const pad=4;
  const w=Math.max(3,Math.ceil(bb.width)+pad*2);
  const h=Math.max(3,Math.ceil(bb.height)+pad*2);
  const ox=bb.x-pad, oy=bb.y-pad;
  const tc=document.createElement('canvas'); tc.width=w; tc.height=h;
  const tg=tc.getContext('2d');
  tg.translate(-ox,-oy); tg.fillStyle='#000'; tg.fill(p2d);
  const img=tg.getImageData(0,0,w,h).data;
  const g=new Uint8Array(w*h);
  for(let i=0;i<w*h;i++){ g[i]=img[i*4+3]>128?1:0; }
  zhangSuenThin(g,w,h);
  const polys=traceSkeleton(g,w,h);
  const strokes=[];
  polys.forEach(poly=>{
    const sp=simplify(poly,1.4);
    if(sp.length<2){ return; }
    let d='M'+(sp[0].x+ox).toFixed(1)+' '+(sp[0].y+oy).toFixed(1);
    for(let i=1;i<sp.length;i++){ d+='L'+(sp[i].x+ox).toFixed(1)+' '+(sp[i].y+oy).toFixed(1); }
    const len=pathLength(d);
    if(len>=3){ strokes.push({d,len}); }
  });
  // 필순 근사: 시작점 위→아래, 왼→오른
  strokes.sort((a,b)=>{ const pa=pathPointAt(a.d,0), pb=pathPointAt(b.d,0); return (pa.y-pb.y)||(pa.x-pb.x); });
  return strokes;
}

// Zhang-Suen 세선화 (1px 골격)
function zhangSuenThin(g,w,h){
  const I=(x,y)=>y*w+x;
  const N=(x,y)=>[g[I(x,y-1)],g[I(x+1,y-1)],g[I(x+1,y)],g[I(x+1,y+1)],g[I(x,y+1)],g[I(x-1,y+1)],g[I(x-1,y)],g[I(x-1,y-1)]];
  let changed=true; const clr=[];
  while(changed){
    changed=false;
    for(let step=0;step<2;step++){
      clr.length=0;
      for(let y=1;y<h-1;y++){ for(let x=1;x<w-1;x++){
        if(g[I(x,y)]!==1){ continue; }
        const n=N(x,y);
        let B=0; for(let k=0;k<8;k++){ B+=n[k]; }
        if(B<2||B>6){ continue; }
        let A=0; for(let k=0;k<8;k++){ if(n[k]===0&&n[(k+1)%8]===1){ A++; } }
        if(A!==1){ continue; }
        if(step===0){ if(n[0]*n[2]*n[4]!==0){ continue; } if(n[2]*n[4]*n[6]!==0){ continue; } }
        else { if(n[0]*n[2]*n[6]!==0){ continue; } if(n[0]*n[4]*n[6]!==0){ continue; } }
        clr.push(I(x,y));
      }}
      if(clr.length){ changed=true; for(const p of clr){ g[p]=0; } }
    }
  }
}

// 골격 픽셀 → 폴리라인(획) 배열
function traceSkeleton(g,w,h){
  const I=(x,y)=>y*w+x;
  const on=(x,y)=> x>=0&&y>=0&&x<w&&y<h&&g[I(x,y)]===1;
  const nb=(x,y)=>{ const r=[]; for(let dy=-1;dy<=1;dy++){ for(let dx=-1;dx<=1;dx++){ if((dx||dy)&&on(x+dx,y+dy)){ r.push([x+dx,y+dy]); } } } return r; };
  const deg=new Map(); const pts=[];
  for(let y=0;y<h;y++){ for(let x=0;x<w;x++){ if(g[I(x,y)]===1){ pts.push([x,y]); deg.set(I(x,y),nb(x,y).length); } } }
  const seen=new Set();
  const ek=(a,b)=> a<b? a+'_'+b : b+'_'+a;
  const polys=[];
  function walk(sx,sy){
    let cx=sx,cy=sy; const poly=[{x:cx,y:cy}];
    while(true){
      let nx=null;
      for(const [ax,ay] of nb(cx,cy)){ const k=ek(I(cx,cy),I(ax,ay)); if(!seen.has(k)){ nx=[ax,ay,k]; break; } }
      if(!nx){ break; }
      seen.add(nx[2]); cx=nx[0]; cy=nx[1]; poly.push({x:cx,y:cy});
      if((deg.get(I(cx,cy))||0)!==2){ break; }
    }
    return poly;
  }
  const starts=pts.filter(([x,y])=>{ const d=deg.get(I(x,y)); return d===1||d>=3; });
  for(const [x,y] of starts){
    while(true){
      let has=false; for(const [ax,ay] of nb(x,y)){ if(!seen.has(ek(I(x,y),I(ax,ay)))){ has=true; break; } }
      if(!has){ break; }
      const p=walk(x,y); if(p.length>=2){ polys.push(p); }
    }
  }
  for(const [x,y] of pts){   // 남은 고리(끝점 없는 폐곡선)
    for(const [ax,ay] of nb(x,y)){ if(!seen.has(ek(I(x,y),I(ax,ay)))){ const p=walk(x,y); if(p.length>=2){ polys.push(p); } break; } }
  }
  return polys;
}

// Douglas-Peucker 단순화
function simplify(P,eps){
  if(P.length<3){ return P; }
  const keep=new Array(P.length).fill(false); keep[0]=keep[P.length-1]=true;
  const st=[[0,P.length-1]];
  const perp=(p,a,b)=>{ const dx=b.x-a.x,dy=b.y-a.y,L=Math.hypot(dx,dy)||1; return Math.abs((p.x-a.x)*dy-(p.y-a.y)*dx)/L; };
  while(st.length){
    const [a,b]=st.pop(); let dm=0,idx=-1;
    for(let i=a+1;i<b;i++){ const d=perp(P[i],P[a],P[b]); if(d>dm){ dm=d; idx=i; } }
    if(dm>eps&&idx>0){ keep[idx]=true; st.push([a,idx],[idx,b]); }
  }
  return P.filter((_,i)=>keep[i]);
}

// ── 폰트 로딩 (캐시) ────────────────────────────────────────────
const fontCache={};
function loadFont(family){
  if(fontCache[family]){ return Promise.resolve(fontCache[family]); }
  const rel=TTF[family];
  if(!rel || typeof opentype==='undefined'){ return Promise.reject(new Error('no-font')); }
  return fetch(TTF_BASE+rel)
    .then(r=>{ if(!r.ok){ throw new Error('http '+r.status); } return r.arrayBuffer(); })
    .then(ab=>{ const f=opentype.parse(ab); fontCache[family]=f; return f; });
}

// ── 레이아웃: 이름을 글자별 벡터 경로로 ──────────────────────────
function buildLayout(font, name, s, withStrokes){
  const cx=W/2, cy=H/2+6;
  // 폭/높이에 맞춰 폰트 크기 축소
  let fs=s.size;
  for(let i=0;i<40;i++){
    const bb=font.getPath(name,0,0,fs).getBoundingBox();
    if((bb.x2-bb.x1)<=650 && (bb.y2-bb.y1)<=210){ break; }
    fs-=4; if(fs<=28){ fs=28; break; }
  }
  const bb=font.getPath(name,0,0,fs).getBoundingBox();
  const tx=cx-(bb.x1+bb.x2)/2, ty=cy-(bb.y1+bb.y2)/2;
  const raw=font.getPaths(name, tx, ty, fs);
  const glyphs=[];
  raw.forEach(p=>{
    const d=p.toPathData(2);
    if(!d){ return; }
    measPath.setAttribute('d',d);
    const gb=measPath.getBBox();
    const p2d=new Path2D(d);
    const strokes= withStrokes ? extractStrokes(p2d, gb) : [];
    let slen=0; strokes.forEach(st=>{ slen+=st.len; });
    glyphs.push({d, p2d, strokes, strokeLen:slen,
                 top:gb.y, bot:gb.y+gb.height, left:gb.x, right:gb.x+gb.width, cx:gb.x+gb.width/2});
  });
  const w=bb.x2-bb.x1, bh=bb.y2-bb.y1;

  // ── 고유성: 시드 기반으로 글자별 기울기/크기/위치를 살짝 변형 ──
  const seed=(variationSeed==null ? hashStr(name+'|'+s.key+'|'+curLang) : variationSeed)>>>0;
  const rnd=mulberry32(seed);
  const n=glyphs.length;
  const driftSlope=(rnd()*2-1)*0.7;                 // 베이스라인 상/하 드리프트
  glyphs.forEach((g,i)=>{
    const gcy=(g.top+g.bot)/2;
    const rotDeg=(rnd()*2-1)*6.0;                   // ±6°
    const sc=1+(rnd()*2-1)*0.07;                    // ±7%
    const dxc=-(g.cx-cx)*0.14;                        // 자간 압축: 중앙으로 당김
    const dx=(rnd()*2-1)*fs*0.03 + dxc;
    const dy=(rnd()*2-1)*fs*0.05 + driftSlope*(i-(n-1)/2)*fs*0.05;
    const m=new DOMMatrix();
    m.translateSelf(dx,dy);
    m.translateSelf(g.cx,gcy); m.rotateSelf(rotDeg); m.scaleSelf(sc); m.translateSelf(-g.cx,-gcy);
    g.mat=m;
  });
  const slant=s.slant+(rnd()*2-1)*0.04-0.08;   // 사인 느낌: 앞으로 더 기울임

  // ── 글자 간 연결획 (한글·라틴 모두, 이어 쓰기) ──
  const connectors=[];
  for(let i=0;i<n-1;i++){
    const a=glyphs[i], b=glyphs[i+1];
    const ae=a.mat.transformPoint(new DOMPoint(a.right, a.bot-fs*0.16));
    const be=b.mat.transformPoint(new DOMPoint(b.left,  b.bot-fs*0.16));
    const gap=be.x-ae.x;
    if(gap>-fs*0.3 && gap<fs*1.6){
      const mx=(ae.x+be.x)/2, my=Math.max(ae.y,be.y)+fs*0.12;
      const d=`M${ae.x.toFixed(1)} ${ae.y.toFixed(1)} Q${mx.toFixed(1)} ${my.toFixed(1)} ${be.x.toFixed(1)} ${be.y.toFixed(1)}`;
      connectors.push({d, len:Math.max(1,pathLength(d))});
    }else{ connectors.push(null); }
  }

  // ── 관통 가로획(사인 스윕): 이름 아래를 쓸고 오른쪽으로 길게 빠지는 획 ──
  let minX=1e9,maxX=-1e9,maxY=-1e9;
  glyphs.forEach(g=>{
    [[g.left,g.top],[g.right,g.top],[g.left,g.bot],[g.right,g.bot]].forEach(([x,y])=>{
      const p=g.mat.transformPoint(new DOMPoint(x,y));
      if(p.x<minX){minX=p.x;} if(p.x>maxX){maxX=p.x;} if(p.y>maxY){maxY=p.y;}
    });
  });
  let sweep=null;
  if(glyphs.length){
    const NW=Math.max(1,maxX-minX), baseY=maxY+fs*0.05;
    const sx=minX-fs*0.18;
    const ex=Math.min(W-8, maxX+NW*0.45+fs*0.2), ey=baseY-fs*0.28;
    const d=`M${sx.toFixed(1)} ${baseY.toFixed(1)} C${(minX+NW*0.28).toFixed(1)} ${(baseY+fs*0.10).toFixed(1)} ${(maxX-NW*0.18).toFixed(1)} ${(baseY-fs*0.04).toFixed(1)} ${ex.toFixed(1)} ${ey.toFixed(1)}`;
    sweep={d, len:Math.max(1,pathLength(d))};
  }

  const deco=(curDeco==='auto' ? s.deco : (curDeco==='none' ? null : curDeco));
  return {fs, cx, cy, slant, glyphs, connectors, sweep, w, bh, color:s.color, flourish:s.flourish, deco,
          flourishY:cy+bh/2+Math.max(10,fs*0.12)};
}

// 좌표를 (cx,cy) 중심으로 slant 회전
function rot(x,y,cx,cy,a){
  const dx=x-cx, dy=y-cy, c=Math.cos(a), s=Math.sin(a);
  return {x:cx+dx*c-dy*s, y:cy+dx*s+dy*c};
}

// ── 정적 렌더 (완성본): 애니메이션 최종 상태 / PNG ───────────────
function renderSolid(L){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(L.cx,L.cy); ctx.rotate(L.slant); ctx.translate(-L.cx,-L.cy);
  ctx.fillStyle=L.color; ctx.strokeStyle=L.color; ctx.lineJoin='round'; ctx.lineCap='round';
  // 연결획 (글자 아래층)
  ctx.lineWidth=Math.max(2,L.fs*0.06);
  (L.connectors||[]).forEach(c=>{ if(c){ ctx.stroke(new Path2D(c.d)); } });
  // 글자 (글자별 변형 적용)
  L.glyphs.forEach(g=>{ ctx.save(); if(g.mat){ ctx.transform(g.mat.a,g.mat.b,g.mat.c,g.mat.d,g.mat.e,g.mat.f); } ctx.fill(g.p2d); ctx.restore(); });
  drawSweep(L,1);
  ctx.restore();
  drawDeco(L,1);
}

// 관통 가로획(사인 스윕) — fp: 0~1 진행도
function drawSweep(L,fp){
  if(!L.sweep){ return; }
  ctx.strokeStyle=L.color; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.lineWidth=Math.max(4,L.fs*0.08);
  if(fp>=1){ ctx.stroke(new Path2D(L.sweep.d)); }
  else{ ctx.setLineDash([L.sweep.len,L.sweep.len]); ctx.lineDashOffset=L.sweep.len*(1-fp); ctx.stroke(new Path2D(L.sweep.d)); ctx.setLineDash([]); }
}

// 장식(밑줄/스월/도트) — fp: 0~1 진행도
function drawFlourish(L,fp){
  ctx.strokeStyle=L.color; ctx.fillStyle=L.color;
  ctx.lineWidth=Math.max(3,L.fs/26); ctx.lineCap='round';
  const x0=L.cx-L.w/2, x1=L.cx-L.w/2+L.w*fp, y=L.flourishY;
  if(L.flourish==='line'){ ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke(); }
  if(L.flourish==='double'){
    ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y);
    const a=L.cx-L.w*0.4, b=L.cx-L.w*0.4+L.w*0.8*fp;
    ctx.moveTo(a,y+10); ctx.lineTo(b,y+10); ctx.stroke();
  }
  if(L.flourish==='swoosh'){
    ctx.beginPath(); ctx.moveTo(x0-10,y);
    ctx.bezierCurveTo(L.cx-L.w/4,y+40, L.cx+L.w/4,y-40, x0-10+(L.w+50)*fp, y-8*fp);
    ctx.stroke();
  }
  if(L.flourish==='dots' && fp>0.6){ for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.arc(L.cx+i*30,y+8,4,0,7); ctx.fill(); } }
}

// ── 벡터 모티브(꾸밈) 라이브러리 — (cx,cy) 중심, 크기 s, 색 color ──
function drawMotif(type, cx, cy, s, color){
  ctx.fillStyle=color; ctx.strokeStyle=color; ctx.lineJoin='round'; ctx.lineCap='round';
  if(type==='heart'){
    ctx.beginPath(); ctx.moveTo(cx, cy+s*0.35);
    ctx.bezierCurveTo(cx+s*0.55, cy-s*0.05, cx+s*0.22, cy-s*0.5, cx, cy-s*0.14);
    ctx.bezierCurveTo(cx-s*0.22, cy-s*0.5, cx-s*0.55, cy-s*0.05, cx, cy+s*0.35);
    ctx.closePath(); ctx.fill();
  }else if(type==='star'){
    ctx.beginPath();
    for(let i=0;i<5;i++){ const a=-Math.PI/2+i*2*Math.PI/5, b=a+Math.PI/5;
      ctx.lineTo(cx+Math.cos(a)*s*0.5, cy+Math.sin(a)*s*0.5);
      ctx.lineTo(cx+Math.cos(b)*s*0.22, cy+Math.sin(b)*s*0.22); }
    ctx.closePath(); ctx.fill();
  }else if(type==='sparkle'){
    ctx.beginPath(); ctx.moveTo(cx,cy-s*0.5);
    ctx.quadraticCurveTo(cx+s*0.1,cy-s*0.1, cx+s*0.5,cy);
    ctx.quadraticCurveTo(cx+s*0.1,cy+s*0.1, cx,cy+s*0.5);
    ctx.quadraticCurveTo(cx-s*0.1,cy+s*0.1, cx-s*0.5,cy);
    ctx.quadraticCurveTo(cx-s*0.1,cy-s*0.1, cx,cy-s*0.5);
    ctx.closePath(); ctx.fill();
  }else if(type==='crown'){
    const w=s*0.9,h=s*0.6, x0=cx-w/2, y0=cy+h*0.4;
    ctx.beginPath(); ctx.moveTo(x0,y0);
    ctx.lineTo(x0, y0-h*0.55); ctx.lineTo(x0+w*0.25, y0-h*0.15);
    ctx.lineTo(cx, y0-h); ctx.lineTo(x0+w*0.75, y0-h*0.15);
    ctx.lineTo(x0+w, y0-h*0.55); ctx.lineTo(x0+w, y0);
    ctx.closePath(); ctx.fill();
  }else if(type==='ribbon'){
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx-s*0.5,cy-s*0.3); ctx.lineTo(cx-s*0.5,cy+s*0.3); ctx.closePath();
    ctx.moveTo(cx,cy); ctx.lineTo(cx+s*0.5,cy-s*0.3); ctx.lineTo(cx+s*0.5,cy+s*0.3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(cx,cy,s*0.13,0,7); ctx.fill();
  }else if(type==='note'){
    ctx.beginPath(); ctx.ellipse(cx-s*0.14,cy+s*0.28,s*0.2,s*0.14,-0.4,0,7); ctx.fill();
    ctx.fillRect(cx+s*0.02,cy-s*0.42,s*0.06,s*0.72);
    ctx.beginPath(); ctx.moveTo(cx+s*0.08,cy-s*0.42);
    ctx.quadraticCurveTo(cx+s*0.42,cy-s*0.34, cx+s*0.26,cy-s*0.02);
    ctx.quadraticCurveTo(cx+s*0.38,cy-s*0.3, cx+s*0.08,cy-s*0.24);
    ctx.closePath(); ctx.fill();
  }else if(type==='clover'){
    for(const [dx,dy] of [[-1,0],[1,0],[0,-1],[0,1]]){ ctx.beginPath(); ctx.arc(cx+dx*s*0.2, cy+dy*s*0.2, s*0.2, 0,7); ctx.fill(); }
    ctx.fillRect(cx-s*0.03, cy+s*0.1, s*0.06, s*0.4);
  }else if(type==='paw'){
    ctx.beginPath(); ctx.ellipse(cx,cy+s*0.12,s*0.26,s*0.2,0,0,7); ctx.fill();
    [[-0.24,-0.18],[0,-0.28],[0.24,-0.18]].forEach(([dx,dy])=>{ ctx.beginPath(); ctx.arc(cx+dx*s,cy+dy*s,s*0.1,0,7); ctx.fill(); });
  }
}

// 꾸밈 심볼 — 이름 우상단에 팝인 (회전 밖). fp:0~1
function drawDeco(L,fp){
  if(!L.deco || fp<=0){ return; }
  ctx.setTransform(1,0,0,1,0,0);
  const p=Math.min(1,fp), e=1-Math.pow(1-p,3);          // ease-out pop
  const s=L.fs*0.5*(0.55+0.45*e);
  ctx.globalAlpha=e;
  drawMotif(L.deco, L.cx+L.w/2+L.fs*0.3, L.cy-L.bh*0.38, s, L.color);
  ctx.globalAlpha=1;
}

// 펜(✏️) — 팁이 (x,y)에 오도록 (회전 밖)
function drawPen(x,y){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.font='36px "Segoe UI Emoji",sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='bottom';
  ctx.fillText('🖌️', x-6, y+18);
}

// ── 핵심: 글자를 획 순서대로 따라 그리는 애니메이션 ─────────────
function animate(){
  const name=(document.getElementById('name').value||'이름').trim();
  const s=STYLES.find(x=>x.key===curStyle);
  const family=FONTS[curLang][curStyle];
  const id=++animId;

  // 로딩 표시
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#b8b0cc'; ctx.font='20px "Malgun Gothic",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('✍️ 준비 중…', W/2, H/2);

  loadFont(family).then(font=>{
    if(id!==animId){ return; }
    const L=buildLayout(font, name, s, true);
    lastLayout=L; lastStyle=s;
    if(!L.glyphs.length){ renderSolid(L); return; }

    // 획(중심선) + 연결획을 그리는 순서대로 펼침
    const items=[]; let acc=0;
    const glyphStart=L.glyphs.map(()=>Infinity), glyphEnd=L.glyphs.map(()=>0);
    L.glyphs.forEach((g,gi)=>{
      glyphStart[gi]=acc;
      if(g.strokes.length){
        g.strokes.forEach(st=>{ items.push({type:'stroke', gi, p2d:new Path2D(st.d), d:st.d, len:st.len, start:acc, end:acc+st.len}); acc+=st.len; });
      }else{
        const fb=Math.max(20, g.bot-g.top);
        items.push({type:'stroke', gi, p2d:null, d:null, len:fb, start:acc, end:acc+fb}); acc+=fb;
      }
      glyphEnd[gi]=acc;
      const c=(L.connectors||[])[gi];
      if(c){ items.push({type:'conn', p2d:new Path2D(c.d), d:c.d, len:c.len, start:acc, end:acc+c.len}); acc+=c.len; }
    });
    const total=Math.max(1,acc);
    const durName=Math.min(5200, Math.max(1600, 800+total*1.5));
    const durFlo=700, durAll=durName+durFlo;
    const brush=Math.max(4, L.fs*0.36);
    const connBrush=Math.max(2, L.fs*0.06);
    let start=null;

    function frame(now){
      if(id!==animId){ return; }
      if(start===null){ start=now; }
      const el=now-start;
      const pName=Math.min(1, el/durName);
      const eName=pName<0.5?2*pName*pName:1-Math.pow(-2*pName+2,2)/2;
      const drawn=total*eName;

      ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H);
      ctx.save();
      ctx.translate(L.cx,L.cy); ctx.rotate(L.slant); ctx.translate(-L.cx,-L.cy);
      ctx.fillStyle=L.color; ctx.strokeStyle=L.color; ctx.lineJoin='round'; ctx.lineCap='round';

      let penScreen=null;

      // 연결획 (글자 아래층, 회전만 적용)
      ctx.lineWidth=connBrush;
      for(const k of items){
        if(k.type!=='conn'){ continue; }
        if(drawn>=k.end){ ctx.stroke(k.p2d); }
        else if(drawn>k.start){
          const local=drawn-k.start;
          ctx.setLineDash([k.len,k.len]); ctx.lineDashOffset=k.len-local; ctx.stroke(k.p2d); ctx.setLineDash([]);
          const pt=pathPointAt(k.d, Math.min(local,k.len)); const sp=rot(pt.x,pt.y,L.cx,L.cy,L.slant); penScreen={x:sp.x,y:sp.y};
        }
      }

      // 글자 (글자별 변형 적용)
      for(let i=0;i<L.glyphs.length;i++){
        const g=L.glyphs[i];
        if(drawn<glyphStart[i]){ continue; }
        ctx.save();
        if(g.mat){ ctx.transform(g.mat.a,g.mat.b,g.mat.c,g.mat.d,g.mat.e,g.mat.f); }
        if(drawn>=glyphEnd[i]){
          ctx.fill(g.p2d);                                     // 완성된 글자: 솔리드
        }else{
          ctx.clip(g.p2d); ctx.lineWidth=brush;                // 그리는 중: 획별 굵은 붓
          for(const k of items){
            if(k.type!=='stroke' || k.gi!==i || !k.p2d){ continue; }
            if(drawn>=k.end){ ctx.stroke(k.p2d); }
            else if(drawn>k.start){
              const local=drawn-k.start;
              ctx.setLineDash([k.len,k.len]); ctx.lineDashOffset=k.len-local; ctx.stroke(k.p2d); ctx.setLineDash([]);
              const pt=pathPointAt(k.d, Math.min(local,k.len));
              const m=ctx.getTransform(); const sp=m.transformPoint(new DOMPoint(pt.x,pt.y)); penScreen={x:sp.x,y:sp.y};
            }
          }
        }
        ctx.restore();
      }

      const floP=Math.min(1, Math.max(0,(el-durName)/durFlo));
      if(pName>=1 && L.sweep){
        ctx.lineWidth=Math.max(4,L.fs*0.08);
        if(floP>=1){ ctx.stroke(new Path2D(L.sweep.d)); }
        else if(floP>0){
          const local=L.sweep.len*floP;
          ctx.setLineDash([L.sweep.len,L.sweep.len]); ctx.lineDashOffset=L.sweep.len-local; ctx.stroke(new Path2D(L.sweep.d)); ctx.setLineDash([]);
          const pt=pathPointAt(L.sweep.d, local); const sp=rot(pt.x,pt.y,L.cx,L.cy,L.slant); penScreen={x:sp.x,y:sp.y};
        }
      }
      ctx.restore();

      drawDeco(L, pName>=1?Math.max(0.001,floP):0);

      if(el<durAll){
        if(penScreen){ drawPen(penScreen.x,penScreen.y); }
        requestAnimationFrame(frame);
      }else{
        renderSolid(L);   // 깔끔한 최종본
      }
    }
    requestAnimationFrame(frame);
  }).catch(()=>{
    if(id!==animId){ return; }
    drawFallback();       // 폰트 로드 실패 → 기존 좌→우 방식
  });
}

// ── 폴백: CSS 폰트 + 좌→우 reveal (opentype 실패 시) ────────────
const buf=document.createElement('canvas'); buf.width=W; buf.height=H;
const bctx=buf.getContext('2d');
function renderStatic(g){
  const name=(document.getElementById('name').value||'이름').trim();
  const s=STYLES.find(x=>x.key===curStyle);
  const font=`"${FONTS[curLang][curStyle]}"`;
  g.clearRect(0,0,W,H); g.save();
  g.translate(W/2, H/2+18); g.rotate(s.slant+jitter*0.02);
  g.textAlign='center'; g.textBaseline='middle'; g.fillStyle=s.color;
  g.font=`${s.size}px ${font}, "Nanum Brush Script", cursive`;
  let fs=s.size;
  while(g.measureText(name).width>640 && fs>28){ fs-=4; g.font=`${fs}px ${font}, cursive`; }
  g.fillText(name,0,0);
  g.restore();
}
function showStatic(){
  animId++;
  // 폰트가 이미 캐시돼 있으면 벡터 완성본, 아니면 CSS 폰트로 즉시 미리보기
  const family=FONTS[curLang][curStyle];
  if(fontCache[family]){
    const s=STYLES.find(x=>x.key===curStyle);
    const name=(document.getElementById('name').value||'이름').trim();
    const L=buildLayout(fontCache[family], name, s, false); lastLayout=L; lastStyle=s;
    if(L.glyphs.length){ renderSolid(L); return; }
  }
  renderStatic(ctx);
}
function drawFallback(){
  renderStatic(bctx);
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H); ctx.drawImage(buf,0,0);
}

// ── PNG 저장 (완성본) ───────────────────────────────────────────
document.getElementById('dl').onclick=()=>{
  if(lastLayout){ renderSolid(lastLayout); }
  else { drawFallback(); }
  const a=document.createElement('a');
  a.download=`sign_${document.getElementById('name').value||'my'}.png`;
  a.href=cv.toDataURL('image/png'); a.click();
};

// ── 시작 ────────────────────────────────────────────────────────
if(document.readyState!=='loading'){ animate(); }
else { window.addEventListener('DOMContentLoaded', animate); }
</script>
